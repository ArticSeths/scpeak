name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/scpeak-server

jobs:
  # ── Docker: Build + Push a GHCR ───────────────────────────────
  docker-publish:
    name: Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Tauri: Windows ────────────────────────────────────────────
  tauri-windows:
    name: Tauri (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri (Windows)
        run: pnpm --filter @scpeak/client tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: |
            apps/client/src-tauri/target/release/bundle/msi/*.msi
            apps/client/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  # ── Tauri: macOS ──────────────────────────────────────────────
  tauri-macos:
    name: Tauri (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri (macOS)
        run: pnpm --filter @scpeak/client tauri build

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-macos
          path: |
            apps/client/src-tauri/target/release/bundle/dmg/*.dmg
            apps/client/src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error

  # ── Tauri: Linux ──────────────────────────────────────────────
  tauri-linux:
    name: Tauri (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri (Linux)
        run: pnpm --filter @scpeak/client tauri build

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-linux
          path: |
            apps/client/src-tauri/target/release/bundle/deb/*.deb
            apps/client/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  # ── GitHub Release ────────────────────────────────────────────
  github-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - docker-publish
      - tauri-windows
      - tauri-macos
      - tauri-linux
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate checksums
        run: |
          cd release-artifacts
          find . -type f -not -name "SHA256SUMS" -exec sha256sum {} \; | sort > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## 🚀 SCPeak ${{ github.ref_name }}

            ### 📦 Imagen Docker
            ```
            docker pull ghcr.io/${{ github.repository_owner }}/scpeak-server:${{ github.ref_name }}
            ```

            ### 🖥️ Escritorio
            Descarga el instalador para tu sistema operativo.

            Consulta [DEPLOY.md](./DEPLOY.md) para instrucciones de despliegue del servidor.
          files: |
            release-artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
