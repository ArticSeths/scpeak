services:
  # 1. Servidor de Comunicaciones (SFU)
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    restart: unless-stopped
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    ports:
      - "7882:7882/udp" # Multiplexación UDP principal
      - "7881:7881/tcp" # Fallback TCP
      - "7880:7880/tcp" # API HTTP / WebSocket
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    depends_on:
      - redis

  # 2. Caché y Estado (Requerido por LiveKit)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  # 3. Base de Datos (Comando Central)
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: