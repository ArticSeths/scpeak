port: 7880
bind_addresses:
  - ""
rtc:
  tcp_port: 7881
  port_range_start: 7882
  port_range_end: 7882
  use_external_ip: false
  enable_loopback_candidate: true
redis:
  address: redis:6379
keys:
  # Las claves se inyectan vía la variable LIVEKIT_KEYS en docker-compose.yml.
  # Si no se define LIVEKIT_KEYS, LiveKit usa este fallback (solo desarrollo local).
  fallback_dev_key: "fallback_dev_secret"
logging:
  json: false
  level: info